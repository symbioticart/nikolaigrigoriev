name: daily-89

# Every morning at 9:00 Madrid the channel receives the current Variation 89
# story — as a FILE (sendDocument), full resolution 1080×1920, exactly the
# page's own canvas pixels via canvas.toDataURL. The frame goes out EVERY day,
# silent days included: a short silence holds the last day, a long one desiccates
# the painting a little more each day toward disappearance, so every frame differs
# — the record of the sleep. A returning signal resurrects the work with a seam.
# Each frame is also committed into the repo at 89/record/<date>.png —
# the write-once archive of what the painting looked like on that day.

on:
  schedule:
    - cron: '0 7 * * *'   # 9:00 Europe/Madrid in summer (CEST); 8:00 in winter
  workflow_dispatch: {}

permissions:
  contents: write

env:
  SITE: https://nikolaigrigoriev.com

jobs:
  shot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Render /89 and capture the canvas
        # everything happens in RUNNER_TEMP so the checked-out repo stays clean
        # for the record commit below
        run: |
          cd "$RUNNER_TEMP"
          npm init -y > /dev/null && npm i --no-save puppeteer-core@23 > /dev/null 2>&1
          CHROME=$(command -v google-chrome || command -v chromium-browser || command -v chromium)
          CHROME="$CHROME" node -e '
            const fs = require("fs");
            const puppeteer = require("puppeteer-core");
            (async () => {
              const browser = await puppeteer.launch({
                executablePath: process.env.CHROME,
                args: ["--no-sandbox", "--enable-unsafe-swiftshader", "--hide-scrollbars"],
              });
              const page = await browser.newPage();
              await page.setViewport({ width: 1200, height: 2000 });
              await page.goto(process.env.SITE + "/89", { waitUntil: "networkidle2", timeout: 60000 });
              await page.waitForFunction("window.__STORY_READY === true", { timeout: 90000 });
              await new Promise(r => setTimeout(r, 1500));
              const dataUrl = await page.evaluate(() =>
                document.getElementById("story").toDataURL("image/png"));
              fs.writeFileSync("89-frame.png", Buffer.from(dataUrl.split(",")[1], "base64"));
              await browser.close();
              console.log("captured", fs.statSync("89-frame.png").size, "bytes");
            })().catch(e => { console.error(e); process.exit(1); });
          '

      - name: Send the full-resolution file to the channel
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          [ -z "$TG_BOT_TOKEN" ] && { echo "no telegram secret"; exit 0; }
          H=$(curl -fsS -m 30 "$SITE/health" || echo '{}')
          last=$(echo "$H" | jq -r '.lastDataDay // "?"')
          n=$(echo "$H" | jq -r '.dayCount // "?"')
          gap=$(echo "$H" | jq -r '.gapDays // 0')
          status=$(echo "$H" | jq -r '.status // ""')
          today=$(TZ=Europe/Madrid date +%Y-%m-%d)
          pretty=$(TZ=Europe/Madrid date +%d.%m.%Y)
          note=""
          case "$status" in
            paused)      note=" Пауза ${gap} дн. — картина замерла на последнем дне." ;;
            dormant)     note=" Тишина ${gap} дн. — картина засыхает и выцветает." ;;
            disappeared) note=" ${gap} дн. тишины — картина исчезла и ждёт сигнала; любые данные возродят её." ;;
          esac
          cp "$RUNNER_TEMP/89-frame.png" "$RUNNER_TEMP/variation-89-${today}.png"
          curl -fsS --max-time 120 "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendDocument" \
            -F chat_id="${TG_CHAT_ID}" -F document=@"$RUNNER_TEMP/variation-89-${today}.png" -F disable_notification=true \
            -F caption="🎨 Проект 89 — утренний кадр ${pretty}, полное разрешение 1080×1920. Последний записанный день: ${last} (№${n}).${note} ${SITE}/89" > /dev/null

      - name: Commit the frame into the record (89/record/)
        run: |
          today=$(TZ=Europe/Madrid date +%Y-%m-%d)
          mkdir -p 89/record
          if [ -f "89/record/${today}.png" ]; then
            echo "frame for ${today} already recorded — write-once, keeping the original"
          else
            cp "$RUNNER_TEMP/89-frame.png" "89/record/${today}.png"
            git config user.name "variation-89 record"
            git config user.email "record@nikolaigrigoriev.com"
            git add "89/record/${today}.png"
            git commit -m "record: variation 89 frame ${today} [skip ci]"
            git pull --rebase --autostash origin main
            git push origin main
          fi

      - name: Telegram alert if the frame failed
        if: failure()
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          [ -z "$TG_BOT_TOKEN" ] && exit 0
          curl -fsS --max-time 15 "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
            -d chat_id="${TG_CHAT_ID}" \
            --data-urlencode "text=🟡 Не получилось сделать утренний кадр проекта 89. Лог: github.com/symbioticart/nikolaigrigoriev/actions" || true
