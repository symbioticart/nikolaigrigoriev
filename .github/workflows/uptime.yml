name: uptime

# Is the site alive at all? Pings every 30 minutes. Alerts once when the site
# goes down, reminds every ~2h while it stays down, and reports recovery with
# the outage duration. Data quality lives in healthcheck.yml — not here.

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch: {}

# The custom domain is pinged on purpose: it covers DNS + certificate + Render.
env:
  SITE: https://nikolaigrigoriev.com

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Restore outage state
        uses: actions/cache/restore@v4
        with:
          path: .upstate
          key: up-state-${{ github.run_id }}
          restore-keys: up-state-

      - name: Ping and report transitions
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: |
          mkdir -p .upstate
          send() { # returns curl status: state only advances when the message left
            [ -z "$TG_BOT_TOKEN" ] && return 0
            curl -fsS --max-time 15 "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d chat_id="${TG_CHAT_ID}" -d disable_web_page_preview=true \
              --data-urlencode "text=$1" > /dev/null
          }
          now=$(date +%s)
          down_since=$(jq -r '.downSince // 0' .upstate/state.json 2>/dev/null || echo 0)
          last_sent=$(jq -r '.lastSent // 0'  .upstate/state.json 2>/dev/null || echo 0)
          if curl -fsS -m 30 --retry 2 --retry-delay 5 "$SITE/health" > /dev/null; then
            if [ "$down_since" -gt 0 ]; then
              mins=$(( (now - down_since) / 60 ))
              if send "🟢 Сайт снова работает. Лежал примерно ${mins} мин."; then
                printf '{"downSince":0,"lastSent":0}' > .upstate/state.json
              fi   # send failed → keep the down state, retry the recovery next run
            else
              printf '{"downSince":0,"lastSent":0}' > .upstate/state.json
            fi
            echo "UP"
          else
            if [ "$down_since" -eq 0 ]; then
              sent=0
              send "🔴 Сайт не отвечает (nikolaigrigoriev.com). Проверяю каждые 30 минут — напишу, когда поднимется. Логи: dashboard.render.com/web/srv-d7ektha8qa3s73ddeqd0" && sent=$now
              printf '{"downSince":%s,"lastSent":%s}' "$now" "$sent" > .upstate/state.json
            elif [ $(( now - last_sent )) -gt 7200 ]; then
              mins=$(( (now - down_since) / 60 ))
              if send "🔴 Сайт всё ещё лежит — уже ${mins} мин."; then
                printf '{"downSince":%s,"lastSent":%s}' "$down_since" "$now" > .upstate/state.json
              fi
            fi
            echo "DOWN=1" >> "$GITHUB_ENV"
            echo "DOWN"
          fi

      - name: Save outage state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .upstate
          key: up-state-${{ github.run_id }}

      - name: Mark the run red while the site is down
        run: '[ "${DOWN:-}" = "1" ] && exit 1 || exit 0'
